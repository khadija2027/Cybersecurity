services:
  # Backend API
  backend:
    build: ./blog-platform/backend
    container_name: blog-backend
    environment:
      PORT: 5000
      JWT_SECRET: your_super_secret_jwt_key_change_in_production_2024
      NODE_ENV: development
      DB_HOST: mysql
      DB_USER: blog_user
      DB_PASSWORD: blog_password
      DB_NAME: blog_platform
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - blog-network
    restart: unless-stopped
    volumes:
      - ./blog-platform/backend:/app
      - /app/node_modules

  # Frontend Web Server
  frontend:
    build: ./blog-platform/frontend
    container_name: blog-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - blog-network
    restart: unless-stopped
    volumes:
      - ./blog-platform/frontend:/app
      - /app/node_modules
    environment:
      - API_URL=http://backend:5000/api

  # MySQL Database
  mysql:
    image: mysql:8.4
    container_name: blog-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: blog_platform
      MYSQL_USER: blog_user
      MYSQL_PASSWORD: blog_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - blog-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:

networks:
  blog-network:
    driver: bridge
