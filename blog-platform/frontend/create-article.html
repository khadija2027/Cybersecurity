<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Write Article - BlogHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="container nav-container">
      <a href="home.html" class="nav-brand">📝 BlogHub</a>
      <ul class="nav-menu" id="userMenu">
        <li><a href="home.html" class="nav-link">Home</a></li>
      </ul>
    </div>
  </nav>

  <!-- Article Form -->
  <div class="form-container">
    <h2 style="text-align: center; margin-bottom: 2rem; color: #333;" id="formTitle">Write New Article</h2>
    <form onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" required minlength="5">
      </div>
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" required>
          <option value="">-- Select Category --</option>
          <option>General</option>
          <option>Technology</option>
          <option>Business</option>
          <option>Lifestyle</option>
          <option>Travel</option>
          <option>Food</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="image">Featured Image (Optional)</label>
        <input type="file" id="image" accept="image/*">
        <small style="color: #999; display: block; margin-top: 0.5rem;">Supported: JPG, PNG, GIF (Max 5MB)</small>
        <div id="imagePreview" style="margin-top: 1rem; display: none;">
          <img id="previewImg" style="max-width: 100%; max-height: 200px; border-radius: 5px;" />
        </div>
      </div>
      <div class="form-group">
        <label for="content">Content</label>
        <textarea id="content" required minlength="20" placeholder="Write your article here..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;" id="submitBtn">Publish Article</button>
      <a href="home.html" class="btn btn-secondary" style="width: 100%; margin-top: 0.5rem; text-align: center;">Cancel</a>
    </form>
  </div>

  <script src="js/api.js"></script>
  <script>
    let editingId = null;

    async function loadArticleForEdit() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) return;

      const article = await getArticle(id);
      if (!article) {
        showNotification('Article not found', 'error');
        return;
      }

      if (currentUser && (currentUser.id !== article.authorId && currentUser.role !== 'admin')) {
        window.location.href = 'article.html?id=' + id;
        return;
      }

      document.getElementById('formTitle').textContent = 'Edit Article';
      document.getElementById('title').value = article.title;
      document.getElementById('category').value = article.category;
      document.getElementById('content').value = article.content;
      document.getElementById('submitBtn').textContent = 'Update Article';
      editingId = id;
    }

    async function handleSubmit(event) {
      event.preventDefault();

      const title = document.getElementById('title').value;
      const content = document.getElementById('content').value;
      const category = document.getElementById('category').value;
      const imageFile = document.getElementById('image').files[0];
      let imageData = null;

      // Convert image to base64 if provided
      if (imageFile) {
        if (imageFile.size > 5 * 1024 * 1024) {
          showNotification('Image size must be less than 5MB', 'error');
          return;
        }
        imageData = await fileToBase64(imageFile);
      }

      let result;
      if (editingId) {
        result = await updateArticle(editingId, title, content, category, imageData);
      } else {
        result = await createArticle(title, content, category, imageData);
      }

      if (result) {
        if (editingId) {
          window.location.href = 'article.html?id=' + editingId;
        } else {
          window.location.href = 'article.html?id=' + result.id;
        }
      }
    }

    // Image preview handler
    document.getElementById('image')?.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          document.getElementById('previewImg').src = event.target.result;
          document.getElementById('imagePreview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });

    // Convert file to base64
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    loadUserFromStorage();  // Load token first
    checkAuth();             // Then check authentication
    updateNavigation();
    loadArticleForEdit();
  </script>
</body>
</html>
