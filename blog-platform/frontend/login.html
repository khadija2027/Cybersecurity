<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BlogHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="container nav-container">
      <a href="index.html" class="nav-brand">📝 BlogHub</a>
      <ul class="nav-menu" id="userMenu">
        <li><a href="index.html" class="nav-link">Home</a></li>
      </ul>
    </div>
  </nav>

  <!-- Login Form -->
  <div class="form-container">
    <h2 style="text-align: center; margin-bottom: 2rem; color: #333;">Login to BlogHub</h2>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 1rem; color: #666;">
      Don't have an account? <a href="register.html" style="color: #667eea;">Sign up</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script>
    function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      loginWithUsername(username, password);
    }

    updateNavigation();
  </script>
</body>
</html>
