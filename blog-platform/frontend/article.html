<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article - BlogHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="container nav-container">
      <a href="index.html" class="nav-brand">📝 BlogHub</a>
      <ul class="nav-menu" id="userMenu">
        <li><a href="index.html" class="nav-link">Home</a></li>
      </ul>
    </div>
  </nav>

  <!-- Article Content -->
  <div class="container">
    <div id="articleContainer" class="article-detail"></div>
  </div>

  <script src="js/api.js"></script>
  <script>
    async function loadArticle() {
      const params = new URLSearchParams(window.location.search);
      const articleId = params.get('id');

      if (!articleId) {
        document.getElementById('articleContainer').innerHTML = '<p>Article not found</p>';
        return;
      }

      const article = await getArticle(articleId);
      if (!article) {
        document.getElementById('articleContainer').innerHTML = '<p>Article not found</p>';
        return;
      }

      document.title = article.title + ' - BlogHub';
      
      const canEdit = currentUser && (currentUser.id === article.authorId || currentUser.role === 'admin');
      const canDelete = canEdit;

      const actionButtons = canEdit ? `
        <button class="btn btn-primary" onclick="window.location.href='create-article.html?id=${article.id}'">Edit</button>
        ${canDelete ? `<button class="btn btn-danger" onclick="if(confirm('Delete this article?')) { deleteArticle('${article.id}').then(() => window.location.href='index.html'); }">Delete</button>` : ''}
      ` : '';

      const container = document.getElementById('articleContainer');
      container.innerHTML = `
        <div class="article-detail-header">
          <h1 class="article-detail-title">${escapeHtml(article.title)}</h1>
          <div class="article-detail-meta">
            <span><strong>By:</strong> ${escapeHtml(article.authorName)}</span>
            <span><strong>Published:</strong> ${formatDate(article.createdAt)}</span>
            <span><strong>Views:</strong> 👁️ ${article.views}</span>
            <span class="article-category">${escapeHtml(article.category)}</span>
          </div>
          <div style="margin-top: 1rem; display: flex; gap: 1rem;">
            ${actionButtons}
          </div>
        </div>
        ${article.image ? `<img src="${article.image}" alt="${escapeHtml(article.title)}" class="article-detail-image">` : ''}
        <div class="article-detail-content">
          ${article.content.split('\n').map(p => `<p>${escapeHtml(p)}</p>`).join('')}
        </div>
        <div class="comments-section">
          <h2 class="comments-title">Comments</h2>
          <div id="commentsContainer"></div>
        </div>
      `;

      loadComments(articleId);
    }

    async function loadComments(articleId) {
      const comments = await getComments(articleId);
      const container = document.getElementById('commentsContainer');

      let html = '';

      if (currentUser) {
        html += `
          <div class="comment-form">
            <textarea id="commentContent" placeholder="Share your thoughts..." required></textarea>
            <button class="btn btn-primary" style="margin-top: 0.5rem;" onclick="submitComment('${articleId}')">Post Comment</button>
          </div>
        `;
      } else {
        html += `<p style="color: #666;"><a href="login.html">Login</a> to post comments</p>`;
      }

      if (comments.length === 0) {
        html += '<p style="color: #999;">No comments yet. Be the first to comment!</p>';
      } else {
        html += comments.map(comment => `
          <div class="comment">
            <div class="comment-author">${escapeHtml(comment.authorName)}</div>
            <div class="comment-time">${formatDate(comment.createdAt)}</div>
            <div class="comment-content">${escapeHtml(comment.content)}</div>
            ${currentUser && (currentUser.id === comment.author || currentUser.role === 'admin') ? `
              <div class="comment-actions">
                <button class="comment-btn" onclick="if(confirm('Delete this comment?')) { deleteComment('${comment.id}').then(() => location.reload()); }">Delete</button>
              </div>
            ` : ''}
          </div>
        `).join('');
      }

      container.innerHTML = html;
    }

    async function submitComment(articleId) {
      if (!currentUser) {
        window.location.href = 'login.html';
        return;
      }

      const content = document.getElementById('commentContent').value;
      if (!content.trim()) {
        showNotification('Please write a comment', 'error');
        return;
      }

      const success = await createComment(content, articleId);
      if (success) {
        document.getElementById('commentContent').value = '';
        loadComments(articleId);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    updateNavigation();
    loadArticle();
  </script>
</body>
</html>
