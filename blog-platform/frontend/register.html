<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - BlogHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="container nav-container">
      <a href="home.html" class="nav-brand">📝 BlogHub</a>
      <ul class="nav-menu" id="userMenu">
        <li><a href="home.html" class="nav-link">Home</a></li>
      </ul>
    </div>
  </nav>

  <!-- Register Form -->
  <div class="form-container">
    <h2 style="text-align: center; margin-bottom: 2rem; color: #333;">Create Your Account</h2>
    <form onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" required minlength="3">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
    </form>
    <p style="text-align: center; margin-top: 1rem; color: #666;">
      Already have an account? <a href="login.html" style="color: #667eea;">Login</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script>
    function handleRegister(event) {
      event.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      register(username, email, password);
    }

    updateNavigation();
  </script>
</body>
</html>
