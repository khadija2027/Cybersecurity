<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Platform - Home</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="container nav-container">
      <a href="index.html" class="nav-brand">📝 BlogHub</a>
      <ul class="nav-menu" id="userMenu">
        <li><a href="index.html" class="nav-link">Home</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <div style="text-align: center; color: #888888; padding: 3rem 0;">
      <h1 style="font-size: 3rem; margin-bottom: 1rem;">Welcome to BlogHub</h1>
      <p style="font-size: 1.2rem; margin-bottom: 2rem;">Share your thoughts, read amazing articles, and engage with the community</p>
    </div>

    <!-- Search and Filter Section -->
    <div class="search-filter-container">
      <div class="search-filter-title">🔍 Search & Filter Articles</div>
      <form class="search-filter-form" id="searchFilterForm">
        <!-- Row 1: Search -->
        <div class="search-row-1">
          <div class="form-group">
            <label for="searchInput">Search Articles</label>
            <input 
              type="text" 
              id="searchInput" 
              placeholder="Search by title or content..."
            >
          </div>
        </div>

        <!-- Row 2: Theme, From Date, To Date -->
        <div class="search-row-2">
          <div class="form-group">
            <label for="categoryFilter">Theme</label>
            <select id="categoryFilter">
              <option value="All">All Themes</option>
              <option value="Technology">Technology</option>
              <option value="Business">Business</option>
              <option value="Lifestyle">Lifestyle</option>
              <option value="Education">Education</option>
              <option value="General">General</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="startDate">From Date</label>
            <input 
              type="date" 
              id="startDate"
            >
          </div>
          
          <div class="form-group">
            <label for="endDate">To Date</label>
            <input 
              type="date" 
              id="endDate"
            >
          </div>
        </div>

        <!-- Row 3: Buttons -->
        <div class="search-row-3">
          <button type="button" class="btn btn-search" onclick="performSearch()">Search</button>
          <button type="button" class="btn btn-reset" onclick="resetFilters()">Reset</button>
        </div>
      </form>
      <div id="searchInfo"></div>
    </div>

    <!-- Articles -->
    <div id="articlesContainer" class="articles-container"></div>
  </div>

  <script src="js/api.js"></script>
  <script>
    async function displayArticles(articles) {
      const container = document.getElementById('articlesContainer');
      
      if (articles.length === 0) {
        container.innerHTML = '<p style="color: white; grid-column: 1/-1; text-align: center; padding: 2rem;">No articles found. Try adjusting your filters!</p>';
        return;
      }

      container.innerHTML = articles.map(article => `
        <div class="article-card" onclick="window.location.href='article.html?id=${article._id}'">
          ${article.image ? `<img src="${article.image}" alt="${escapeHtml(article.title)}" class="article-image">` : '<div class="article-image">📝</div>'}
          <div class="article-header">
            <h3 class="article-title">${escapeHtml(article.title)}</h3>
            <div class="article-meta">
              <span class="article-author">By ${escapeHtml(article.authorName)}</span>
              <span>${formatDate(article.createdAt)}</span>
            </div>
          </div>
          <div class="article-content">
            ${escapeHtml(article.content.substring(0, 100))}...
          </div>
          <div class="article-footer">
            <span class="article-category">${escapeHtml(article.category)}</span>
            <span class="article-views">👁️ ${article.views} views</span>
          </div>
        </div>
      `).join('');
    }

    async function loadArticles() {
      const articles = await getArticles();
      displayArticles(articles);
    }

    async function performSearch() {
      const search = document.getElementById('searchInput').value;
      const category = document.getElementById('categoryFilter').value;
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;

      const articles = await getArticlesFiltered(search, category, startDate, endDate);
      displayArticles(articles);

      // Show search info
      const searchInfo = document.getElementById('searchInfo');
      let infoText = `Found ${articles.length} article${articles.length !== 1 ? 's' : ''}`;
      if (search) infoText += ` matching "${search}"`;
      if (category && category !== 'All') infoText += ` in ${category}`;
      if (startDate || endDate) {
        infoText += ` from ${startDate || 'the beginning'} to ${endDate || 'today'}`;
      }
      searchInfo.innerHTML = `<div class="search-results-info">${infoText}</div>`;
    }

    function resetFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('categoryFilter').value = 'All';
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
      document.getElementById('searchInfo').innerHTML = '';
      loadArticles();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Load on page load
    updateNavigation();
    loadArticles();
  </script>
</body>
</html>
