version: '3.9'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: blog-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - blog-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    container_name: blog-backend
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/blog-platform?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key_change_in_production_2024
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - blog-network
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend Web Server
  frontend:
    build: ./frontend
    container_name: blog-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - blog-network
    restart: unless-stopped
    volumes:
      - ./frontend:/app
    environment:
      - API_URL=http://localhost:5000/api

volumes:
  mongodb_data:

networks:
  blog-network:
    driver: bridge
