<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - BlogHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="container nav-container">
      <a href="index.html" class="nav-brand">📝 BlogHub</a>
      <ul class="nav-menu" id="userMenu">
        <li><a href="index.html" class="nav-link">Home</a></li>
      </ul>
    </div>
  </nav>

  <!-- Dashboard -->
  <div class="container">
    <h1 style="color: white; margin: 2rem 0;">Admin Dashboard</h1>

    <!-- Statistics -->
    <div class="dashboard-grid">
      <div class="dashboard-card">
        <h3>Total Users</h3>
        <div class="number" id="totalUsers">0</div>
      </div>
      <div class="dashboard-card">
        <h3>Active Users</h3>
        <div class="number" id="activeUsers">0</div>
      </div>
      <div class="dashboard-card">
        <h3>Total Articles</h3>
        <div class="number" id="totalArticles">0</div>
      </div>
      <div class="dashboard-card">
        <h3>Total Comments</h3>
        <div class="number" id="totalComments">0</div>
      </div>
    </div>

    <!-- Users Table -->
    <h2 style="color: white; margin-top: 3rem; margin-bottom: 1rem;">Registered Users</h2>
    <div class="users-table">
      <table>
        <thead>
          <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Joined</th>
            <th>Last Login</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr>
            <td colspan="7" style="text-align: center;">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    async function loadDashboard() {
      // Load statistics
      const stats = await getStats();
      if (stats) {
        document.getElementById('totalUsers').textContent = stats.totalUsers;
        document.getElementById('activeUsers').textContent = stats.activeUsers;
        document.getElementById('totalArticles').textContent = stats.totalArticles;
        document.getElementById('totalComments').textContent = stats.totalComments;
      }

      // Load users
      const users = await getUsers();
      const tbody = document.getElementById('usersTableBody');

      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No users found</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(user => `
        <tr>
          <td>${escapeHtml(user.username)}</td>
          <td>${escapeHtml(user.email)}</td>
          <td><strong>${user.role.toUpperCase()}</strong></td>
          <td>${user.isActive ? '<span style="color: green;">✓ Active</span>' : '<span style="color: red;">✗ Inactive</span>'}</td>
          <td>${formatDate(user.createdAt)}</td>
          <td>${user.lastLogin ? formatDate(user.lastLogin) : 'Never'}</td>
          <td>
            ${user.isActive && user.role === 'user' ? `
              <button class="comment-btn" onclick="deactivateUserConfirm('${user._id}', '${escapeHtml(user.username)}')">Deactivate</button>
            ` : ''}
            <button class="comment-btn" onclick="viewUserActivity('${user._id}')">View Activity</button>
          </td>
        </tr>
      `).join('');
    }

    async function deactivateUserConfirm(userId, username) {
      if (confirm(`Deactivate user "${username}"?`)) {
        const success = await deactivateUser(userId);
        if (success) {
          loadDashboard();
        }
      }
    }

    async function viewUserActivity(userId) {
      try {
        const response = await apiCall(`/admin/users/${userId}/activity`);
        alert(`Activity for ${response.user.username}:\nArticles: ${response.articles}\nComments: ${response.comments}\nLast Login: ${response.lastLogin ? formatDate(response.lastLogin) : 'Never'}`);
      } catch (error) {
        showNotification(error.message, 'error');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadUserFromStorage();  // Load token first
    checkAdmin();            // Then check admin access
    updateNavigation();
    loadDashboard();

    // Refresh dashboard every 30 seconds
    setInterval(loadDashboard, 30000);
  </script>
</body>
</html>
